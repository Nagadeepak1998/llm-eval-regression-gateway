apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-eval-regression-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: llm-eval-regression-gateway
  template:
    metadata:
      labels:
        app: llm-eval-regression-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "8000"
    spec:
      containers:
        - name: api
          image: ghcr.io/nagadeepak1998/llm-eval-regression-gateway:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000

